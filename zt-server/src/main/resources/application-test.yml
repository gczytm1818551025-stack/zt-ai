    driverClassName: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/react_ai?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=true&serverTimezone=GMT%2B8
    username: root
    password: Mx551818
  data:
    mongodb:
      host: localhost
      port: 27017
      authentication-database: admin
      database: react_ai
      username: admin
      password: Mx551818
      auto-index-creation: true
    redis:
      host: localhost
      port: 6379
      database: 0
      password:
      timeout: 10s
      # ==================== Lettuce连接池配置 ====================
      # 连接池配置（使用commons-pool2实现）
      lettuce:
        pool:
          # 最大连接数：连接池能分配的最大连接数
          # 建议值：50-200（根据并发量调整）
          max-active: 100
          # 最大空闲连接数：连接池中最多保持的空闲连接数
          # 建议值：10-50
          max-idle: 20
          # 最小空闲连接数：连接池中至少保持的空闲连接数
          # 建议值：5-10
          min-idle: 5
          # 获取连接最大等待时间（毫秒）：当连接池耗尽时，客户端等待获取连接的最大时间
          # -1表示无限等待，建议设置一个合理值避免阻塞
          max-wait: 10000
          # 空闲连接检测间隔（毫秒）：定期检测并清理无效空闲连接
          # 建议值：30000-60000（30-60秒）
          time-between-eviction-runs: 60000
