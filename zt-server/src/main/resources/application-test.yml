server:
  port: 18081
  tomcat:
    uri-encoding: UTF-8
    # 连接数满后的排队数，默认为100
    accept-count: 1000
    threads:
      max: 800
      # Tomcat启动初始线程数，默认值10
      min-spare: 70

# 日志配置
logging:
  level:
    org.dialectics: debug
    org.springframework: warn

zt-ai:
  memory:
    maxMessages: 100
  file:
    base: ~/tmp
    domain: http://localhost:18081
  # ReAct 异步执行配置
  react:
    # 最大步数
    max-step: 15
    # 每次调用最大动作数
    max-action-per-call: 10
    # LLM 调用特点：I/O 密集、耗时较长(1-10秒)、需要较多并发
    llm:
      # 核心线程数：建议设置为 CPU 核心数或略高
      # 4核CPU建议: 20
      # 8核CPU建议: 40
      core-pool-size: 20
      # 最大线程数：建议设置为 CPU 核心数的 2-4 倍
      # 4核CPU建议: 50-100
      # 8核CPU建议: 100-200
      max-pool-size: 100
      # 队列容量：超出此值后创建新线程，线程池满后拒绝新任务
      queue-capacity: 500
      # 线程空闲存活时间（秒）：超过此时间会被回收
      keep-alive-seconds: 120
      # 单次 LLM 调用超时时间（秒）
      timeout-seconds: 60

    # 工具执行特点：I/O 密集、耗时中等(0.1-2秒)
    tool:
      # 核心线程数
      core-pool-size: 10
      # 最大线程数
      max-pool-size: 50
      # 队列容量
      queue-capacity: 200
      # 线程空闲存活时间（秒）
      keep-alive-seconds: 60
      # 单次工具执行超时时间（秒）
      timeout-seconds: 30

    # 整个请求超时时间（秒）
    request-timeout-seconds: 300

    # ==================== 背压配置 ====================
    # FluxSink 缓冲区大小
    backpressure-buffer-size: 2048
    # 背压策略：BUFFER(缓冲) | DROP(丢弃) | DROP_OLDEST(丢弃最旧) | LATEST(保留最新) | ERROR(报错) | IGNORE(忽略)
    backpressure-strategy: BUFFER

