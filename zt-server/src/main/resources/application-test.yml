mybatis-plus:
  # 持久层实体类所在包别名
  typeAliasesPackage: org.dialectics.ai.**.pojo
  # mapper.xml映射文件扫描路径
  mapperLocations: classpath*:mapper/**/*Mapper.xml
  global-config:
    db-config:
      id-type: assign_id
      update-strategy: not_null
  configuration:
    map-underscore-to-camel-case: true
    default-enum-type-handler: com.baomidou.mybatisplus.core.handlers.MybatisEnumTypeHandler # mybatis-plus的枚举处理器

